services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: signalflow
      POSTGRES_USER: signalflow
      POSTGRES_PASSWORD: signalflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signalflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ingest:
    build:
      context: ./ingest-java
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/signalflow
      DATABASE_USER: signalflow
      DATABASE_PASSWORD: signalflow
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
