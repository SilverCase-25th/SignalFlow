spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/signalflow}
    username: ${DATABASE_USER:signalflow}
    password: ${DATABASE_PASSWORD:signalflow}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
